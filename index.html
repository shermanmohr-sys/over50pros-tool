<script>
var skills = [];
var goal = 'side-hustle';

document.getElementById('skillInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addSkill();
});

function addSkill() {
  var input = document.getElementById('skillInput');
  var val = input.value.trim();
  if (!val || skills.indexOf(val) !== -1 || skills.length >= 10) return;
  skills.push(val);
  input.value = '';
  renderPills();
}

function addSug(el) {
  var val = el.textContent.trim();
  if (skills.indexOf(val) === -1 && skills.length < 10) {
    skills.push(val);
    renderPills();
  }
}

function removeSkill(s) {
  var i = skills.indexOf(s);
  if (i > -1) skills.splice(i, 1);
  renderPills();
}

function renderPills() {
  var c = document.getElementById('pills');
  var html = '';
  for (var i = 0; i < skills.length; i++) {
    html += '<div class="pill">' + skills[i] + '<button onclick="removeSkill(\'' + skills[i].replace(/'/g,"\\'") + '\')">x</button></div>';
  }
  c.innerHTML = html;
}

function selectGoal(el) {
  var opts = document.querySelectorAll('.goal-opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  goal = el.getAttribute('data-goal');
}

function generate() {
  var email = document.getElementById('emailInput').value.trim();
  if (!email) { alert('Please enter your email to receive results.'); return; }
  if (skills.length === 0) { alert('Please add at least one skill to continue.'); return; }
  
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('loading').classList.add('active');

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/generate', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      document.getElementById('loading').classList.remove('active');
      if (xhr.status === 200) {
        try {
          var responseData = JSON.parse(xhr.responseText);
          var aiText = responseData.candidates[0].content.parts[0].text;
          var cleanIdeas = JSON.parse(aiText); 
          renderResults(cleanIdeas);
        } catch(e) {
          console.error("AI Data Mapping Error:", e);
          renderResults(fallback());
        }
      } else {
        renderResults(fallback());
      }
    }
  };
  xhr.send(JSON.stringify({ email: email, skills: skills, goal: goal }));
}

function fallback() {
  return [
    { title: 'Expert Consulting Service', description: 'Leverage your career skills to provide high-value advice.', type: 'Consulting', skillsUsed: skills.slice(0,2), timeToLaunch: '2 weeks', earningPotential: '$100+/hr', firstStep: 'Define your primary offer.' },
    { title: 'Specialized Training Program', description: 'Teach others what you have spent decades mastering.', type: 'Education', skillsUsed: skills.slice(0,1), timeToLaunch: '4 weeks', earningPotential: '$500+/student', firstStep: 'Draft a simple syllabus.' },
    { title: 'Boutique Service Agency', description: 'Manage a team or use your skills to solve specific niche problems.', type: 'Business', skillsUsed: skills.slice(0,2), timeToLaunch: '1 month', earningPotential: '$5k+/mo', firstStep: 'Identify your first 3 target clients.' }
  ];
}

function renderResults(ideas) {
  var FREE_COUNT = 3;
  var container = document.getElementById('ideasContainer');
  document.getElementById('ideasCount').textContent = ideas.length;
  var html = '<div class="free-banner"><p><strong>Your first 3 ideas are free.</strong> Upgrade to unlock all ' + ideas.length + ' ideas.</p></div>';

  for (var i = 0; i < FREE_COUNT && i < ideas.length; i++) {
    html += renderCard(ideas[i], i + 1);
  }

  var remaining = ideas.length - FREE_COUNT;
  html += '<div class="lock-wall"><h3>' + remaining + ' More Ideas Ready</h3><a href="https://over50pros.com/upgrade" class="btn-unlock">Unlock Full Report</a></div>';
  container.innerHTML = html;
  document.getElementById('results').classList.add('active');
}

function renderCard(idea, num) {
  var numStr = num < 10 ? '0' + num : '' + num;
  var tags = (idea.skillsUsed || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
  return `<div class="idea-card">
    <div class="card-top"><div class="card-num">${numStr}</div></div>
    <h3>${idea.title}</h3>
    <p class="desc">${idea.description}</p>
    <div class="card-details">
      <div class="detail-box"><div class="dl">Potential</div><div class="dv">${idea.earningPotential}</div></div>
      <div class="detail-box" style="grid-column:1/-1"><div class="dl">Next Step</div><div class="dv">${idea.firstStep}</div></div>
    </div>
    <div class="skills-used">${tags}</div>
  </div>`;
}

function reset() {
  skills = [];
  renderPills();
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('results').classList.remove('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
