<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Over50Pros | Wisdom Engine</title>
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: #f4f4f4; 
    padding: 20px; 
    line-height: 1.6; 
    color: #333;
  }
  .card { 
    max-width: 600px; 
    margin: 40px auto; 
    background: white; 
    padding: 40px; 
    border-radius: 12px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
  }
  h2 { 
    color: #005A8D; 
    margin-top: 0; 
    font-weight: 800; 
    text-align: center; 
  }
  label { 
    display: block; 
    margin-top: 15px; 
    font-weight: 600; 
    color: #555; 
  }
  input, select, button { 
    width: 100%; 
    padding: 14px; 
    margin: 8px 0; 
    border: 1px solid #ddd; 
    border-radius: 6px; 
    font-size: 16px; 
    box-sizing: border-box; 
  }
  button { 
    background: #6EBE44; 
    color: white; 
    font-weight: 700; 
    cursor: pointer; 
    border: none; 
    transition: 0.2s; 
    margin-top: 20px; 
  }
  button:hover { 
    background: #5da339; 
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .error { 
    color: #b00; 
    background: #fee; 
    padding: 15px; 
    border-radius: 6px; 
    margin-top: 25px; 
    font-family: monospace; 
    font-size: 12px; 
    display: none; 
    white-space: pre-wrap; 
    border: 1px solid #fcc; 
  }
  .results { 
    margin-top: 30px; 
    display: none; 
  }
  .item { 
    border-left: 5px solid #005A8D; 
    padding: 20px; 
    margin-bottom: 15px; 
    background: #f9f9f9; 
    border-radius: 0 8px 8px 0; 
  }
  .item strong { 
    color: #005A8D; 
    font-size: 18px; 
    display: block; 
    margin-bottom: 5px; 
  }
  #loader { 
    text-align: center; 
    margin-top: 20px; 
    color: #666; 
    font-style: italic; 
    display: none; 
  }
  .upgrade-box {
    background: #005A8D;
    color: white;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    margin-top: 20px;
  }
  .upgrade-box h3 { margin-top: 0; }
</style>
</head>
<body>
  <div class="card">
    <h2>Wisdom Engine</h2>
    
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com">
    
    <label for="intent">What is your primary goal?</label>
    <select id="intent">
      <option value="Gig Work">Find Profitable Gig Work</option>
      <option value="Lifestyle Business">Start a Lifestyle Business</option>
      <option value="Career Pivot">Pivot to a New Career</option>
    </select>
    
    <label for="skills">Enter Skills (comma separated)</label>
    <input type="text" id="skills" placeholder="e.g. Project Management, Sales, Mentoring">
    
    <button id="go">Generate 12 Custom Ideas</button>
    
    <div id="loader">Consulting the AI Engine...</div>
    <div id="err" class="error"></div>
    
    <div id="res" class="results"></div>
  </div>

<script>
  document.getElementById('go').onclick = async () => {
    const err = document.getElementById('err');
    const resDiv = document.getElementById('res');
    const loader = document.getElementById('loader');
    const goBtn = document.getElementById('go');
    
    const email = document.getElementById('email').value.trim();
    const skills = document.getElementById('skills').value.trim();
    const intent = document.getElementById('intent').value;

    if (!email || !skills) {
      alert("Please enter both your email and your skills.");
      return;
    }
    
    err.style.display = 'none';
    resDiv.style.display = 'none';
    loader.style.display = 'block';
    goBtn.disabled = true;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, intent, skills })
      });

      const data = await response.json();
      loader.style.display = 'none';
      goBtn.disabled = false;

      if (!response.ok) {
        err.style.display = 'block';
        err.innerText = "Error " + response.status + ":\n" + JSON.stringify(data, null, 2);
        return;
      }

      resDiv.style.display = 'block';
      resDiv.innerHTML = "<h3>Your Top 3 Opportunities</h3>";
      
      data.free_ideas.forEach(i => {
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `<strong>${i.title}</strong>${i.description}`;
        resDiv.appendChild(item);
      });

      const upgrade = document.createElement('div');
      upgrade.className = 'upgrade-box';
      upgrade.innerHTML = `
        <h3>Unlock All 12 Ideas</h3>
        <p>Your full personalized roadmap is ready.</p>
        <button style="margin-top:10px;" onclick="window.location.href='https://over50pros.com/upgrade'">Get Full Report — $15</button>
      `;
      resDiv.appendChild(upgrade);

    } catch (e) {
      loader.style.display = 'none';
      goBtn.disabled = false;
      err.style.display = 'block';
      err.innerText = "Network/Fetch Error: " + e.message;
    }
  };
</script>
</body>
</html>
