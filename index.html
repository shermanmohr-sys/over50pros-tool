<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisdom Engine | Over50Pros</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#005A8D;--green:#6EBE44;--gray:#F4F4F4;--slate:#1E1E1E;--sky:#B3DDEE;--white:#ffffff;}
body{font-family:'Source Sans Pro',sans-serif;background:var(--gray);color:var(--slate);margin:0;}
.hero{background:var(--blue);padding:60px 20px;text-align:center;color:white;border-bottom:5px solid var(--green);}
.container{max-width:800px;margin:-40px auto 60px;padding:0 20px;}
.card{background:white;padding:40px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
h1{font-weight:900;margin:0;font-size:2.5rem;} h1 em{color:var(--green);font-style:normal;}
.input-group{margin-bottom:25px;} label{display:block;font-weight:700;margin-bottom:8px;color:var(--blue);}
input, select{width:100%;padding:15px;border:2px solid #ddd;border-radius:8px;font-size:1rem;box-sizing:border-box;}
.btn-main{width:100%;background:var(--green);color:white;padding:20px;border:none;border-radius:10px;font-size:1.2rem;font-weight:700;cursor:pointer;transition:0.3s;}
.btn-main:hover{background:var(--slate);}
.pill-container{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pill{background:var(--sky);padding:6px 15px;border-radius:20px;font-size:0.9rem;font-weight:600;color:var(--blue);}
#results, #loading{display:none;margin-top:30px;}
.idea-card{border-left:5px solid var(--blue);padding:20px;background:#f9f9f9;margin-bottom:15px;border-radius:0 10px 10px 0;}
</style>
</head>
<body>

<div class="hero"><h1>Where <em>Experience</em> Meets Opportunity</h1></div>

<div class="container">
  <div class="card" id="mainApp">
    <div class="input-group">
      <label>Step 1: Where should we send your results?</label>
      <input type="email" id="email" placeholder="email@example.com">
    </div>

    <div class="input-group">
      <label>Step 2: What is your primary goal?</label>
      <select id="intent">
        <option value="Gig Work">Find Profitable Gig Work</option>
        <option value="Starting a Business">Start a Lifestyle Business</option>
        <option value="Apply for a Job">Land a New Job (Portfolio Builder)</option>
        <option value="Build a Project">Build a Personal Project</option>
      </select>
    </div>

    <div class="input-group">
      <label>Step 3: Enter up to 8 Life/Job Skills (Press Enter)</label>
      <input type="text" id="skillInput" placeholder="e.g. Leadership, Accounting, Teaching">
      <div class="pill-container" id="pillContainer"></div>
    </div>

    <button class="btn-main" onclick="generateWisdom()">✦ Generate My 12 Project Ideas</button>
  </div>

  <div id="loading" style="text-align:center;"><h2>Consulting the Wisdom Engine...</h2></div>

  <div id="results">
    <h2 id="resultHeader">Your Top 3 Ideas</h2>
    <div id="ideasContent"></div>
    <div style="background:var(--blue); color:white; padding:30px; border-radius:10px; text-align:center; margin-top:20px;">
      <h3>9 More Ideas & Full Implementation Guide Ready</h3>
      <p>Unlock your complete 12-idea report for a one-time payment.</p>
      <button class="btn-main" onclick="window.location.href='https://over50pros.com/upgrade'">Unlock Full Report — $15</button>
    </div>
  </div>
</div>

<script>
let skills = [];
const skillInput = document.getElementById('skillInput');

skillInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && skills.length < 8) {
    skills.push(skillInput.value);
    skillInput.value = '';
    renderPills();
  }
});

function renderPills() {
  document.getElementById('pillContainer').innerHTML = skills.map(s => `<div class="pill">${s}</div>`).join('');
}

async function generateWisdom() {
  const email = document.getElementById('email').value;
  const intent = document.getElementById('intent').value;
  const currentVal = skillInput.value.trim();
  
  // New: If the user forgot to hit Enter, add whatever is in the box now
  if (currentVal && !skills.includes(currentVal)) {
    skills.push(currentVal);
    renderPills();
    skillInput.value = '';
  }

  if (!email || skills.length === 0) return alert("Please provide email and at least one skill.");

  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, intent, skills, userId: '00000000-0000-0000-0000-000000000000' }) // Temporary ID for testing
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error);
    displayResults(data.free_ideas);
  } catch (err) {
    alert("Connection error. Check your Vercel logs or environment keys.");
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  }
}

function displayResults(ideas) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  
  const container = document.getElementById('ideasContent');
  
  if (!ideas || ideas.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>Generating high-quality ideas... please refresh and try again in 10 seconds.</p>";
    return;
  }

  container.innerHTML = ideas.map((idea, i) => {
    // This part handles different naming styles from the AI
    const projectTitle = idea.title || "Project Idea " + (i + 1);
    const projectDesc = idea.description || "A custom project tailored to your skills.";
    const skillList = idea.skillsUsed || idea.skills_used || [];

    return `
    <div class="idea-card">
      <h3 style="margin-top:0; color:var(--blue);">${i+1}. ${projectTitle}</h3>
      <p style="line-height:1.5; color:var(--slate);">${projectDesc}</p>
      <div style="margin-top:10px;">
        ${skillList.map(s => `<span class="pill" style="font-size:0.75rem; margin-right:5px;">${s}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
